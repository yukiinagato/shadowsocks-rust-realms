name: Clippy Check

# Manual-only. Automatic CI is realm.yml.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: "trace"

jobs:
  clippy-check:
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - if: ${{ runner.os == 'Windows' }}
        uses: ilammy/setup-nasm@v1
      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component clippy
          rustup default stable
      # Replaced the deprecated `actions-rs/clippy-check@v1` (runs on Node 20 and
      # fails with "Resource not accessible by integration" when the workflow
      # token cannot post to the Checks API, e.g. on forks). A plain `cargo
      # clippy` run fails the job on lint errors without any special permission.
      - name: Clippy Check
        run: cargo clippy --features "full-extra local-flow-stat utility-url-outline" -- -A clippy::absurd_extreme_comparisons
