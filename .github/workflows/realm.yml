name: Realm Transport

# This is the project's primary automatic CI. It verifies the realm transport
# end-to-end and produces ready-to-download `--features realm` binaries
# (sslocal / ssserver). The inherited upstream workflows are manual-only.
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # cmake 4.x dropped pre-3.5 compatibility (aws-lc-sys); harmless on 3.x.
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  # ---------------------------------------------------------------------------
  # Test + end-to-end (Linux). Gates the binary build below.
  # ---------------------------------------------------------------------------
  test:
    name: Test & end-to-end (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang cmake nasm

      - name: Install Rust (stable + clippy)
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component clippy
          rustup default stable

      - name: Test shadowsocks-realm (unit + integration)
        run: cargo test -p shadowsocks-realm --verbose --no-fail-fast

      - name: Clippy shadowsocks-realm (deny warnings)
        run: cargo clippy -p shadowsocks-realm --all-targets -- -D warnings

      - name: Test realm config parsing
        run: cargo test -p shadowsocks-service --features realm --lib config::tests --no-fail-fast

      - name: Test shadowsocks-over-realm end-to-end (library)
        run: cargo test -p shadowsocks --features realm --test realm_e2e --verbose

      - name: Test PATH B direct-TCP upgrade end-to-end (library)
        run: cargo test -p shadowsocks --features realm --test realm_path_b --verbose

      - name: Build debug binaries (--features realm)
        run: cargo build --features realm --bin sslocal --bin ssserver

      - name: Binary end-to-end (curl -> sslocal -> QUIC -> ssserver -> target)
        run: bash testing/realm-e2e/run_binary_e2e.sh target/debug

      - name: Double-NAT testbed (best-effort)
        continue-on-error: true
        run: |
          cd testing/nat-sim
          unshare -Urnm --map-root-user env -u http_proxy -u https_proxy -u all_proxy bash punch_demo.sh

      - name: Build NAT-PMP testbed helper
        run: cargo build -p shadowsocks-realm --example natpmp_map

      - name: Real NAT-PMP gateway + NAT forwarding (best-effort)
        continue-on-error: true
        run: |
          unshare -Urnm --map-root-user env -u http_proxy -u https_proxy -u all_proxy \
            bash testing/natpmp-sim/run.sh

  # ---------------------------------------------------------------------------
  # Release binaries with --features realm, one artifact per native target.
  # fail-fast: false so a problem on one OS never blocks the others.
  # ---------------------------------------------------------------------------
  binaries:
    name: Build realm binaries (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake nasm

      - name: Install NASM (Windows, for aws-lc-sys)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Install Rust (stable)
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build sslocal + ssserver (--release --features realm)
        run: cargo build --release --features realm --target ${{ matrix.target }} --bin sslocal --bin ssserver

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/sslocal$ext" dist/
          cp "target/${{ matrix.target }}/release/ssserver$ext" dist/
          ls -la dist

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ss-realm-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
